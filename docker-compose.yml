version: '3.8'

services:
  postgres-db:
    image: postgres:18-alpine
    container_name: odata_security_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ODataSecurityDemo
    ports:
      - "54320:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d/
    restart: unless-stopped